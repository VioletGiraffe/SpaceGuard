name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.*'
        target: desktop
        archives: 'qtbase icu'
        cache: 'true'

    - name: Set up MSVC
      if: startsWith(matrix.os, 'windows')
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build application on Windows
      if: startsWith(matrix.os, 'windows')
      shell: cmd
      run: |
        "%QT_ROOT_DIR%\bin\qmake.exe" -v
        "%QT_ROOT_DIR%\bin\qmake.exe" -tp vc -r
        msbuild SpaceGuard.sln /t:Build /p:Configuration=Release;PlatformToolset=v143

    - name: Build tests on Windows
      if: startsWith(matrix.os, 'windows')
      shell: cmd
      working-directory: tests
      run: |
        "%QT_ROOT_DIR%\bin\qmake.exe" -tp vc -r
        msbuild tests.sln /t:Build /p:Configuration=Release;PlatformToolset=v143

    - name: Build application on macOS and Linux
      if: ${{ !startsWith(matrix.os, 'windows') }}
      run: |
        "$QT_ROOT_DIR/bin/qmake" -v
        "$QT_ROOT_DIR/bin/qmake" -r CONFIG+=release
        make -j2

    - name: Build tests on macOS and Linux
      if: ${{ !startsWith(matrix.os, 'windows') }}
      working-directory: tests
      run: |
        "$QT_ROOT_DIR/bin/qmake" -r CONFIG+=release
        make -j2

    - name: Run tests on Windows
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: .\bin\release\spaceguard_testapp.exe

    - name: Run tests on macOS and Linux
      if: ${{ !startsWith(matrix.os, 'windows') }}
      run: ./bin/release/spaceguard_testapp
